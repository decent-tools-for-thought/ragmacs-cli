name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: python -m pip install --upgrade build

      - name: Build distribution artifacts
        run: python -m build

      - name: Smoke test install from sdist
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip setuptools wheel
          .venv-sdist/bin/python -m pip install --no-build-isolation dist/ragmacs_cli-*.tar.gz
          .venv-sdist/bin/python -c "import ragmacs_cli; import ragmacs_cli.cli"
          .venv-sdist/bin/ragmacs-cli --help >/dev/null

      - name: Smoke test install from wheel
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install dist/ragmacs_cli-*.whl
          .venv-wheel/bin/python -c "import ragmacs_cli; import ragmacs_cli.cli"
          .venv-wheel/bin/ragmacs-cli --help >/dev/null

      - name: Generate checksums
        run: |
          (
            cd dist
            sha256sum ragmacs_cli-* > SHA256SUMS
          )

      - uses: actions/upload-artifact@v4
        with:
          name: ragmacs-cli-dist
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ragmacs-cli-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ragmacs_cli-*.tar.gz
            dist/ragmacs_cli-*.whl
            dist/SHA256SUMS
